<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>

    <div style="text-align: center; margin-bottom: 20px;">
        <a href="{{ url_for('add') }}">Create New Post</a>
    </div>

    {% for post in posts %}
    <div class="post">
        <h2>{{ post.title }}</h2>
        <p><em>Written by {{ post.author }}</em></p>
        <p>{{ post.content }}</p>

        <div style="text-align: right; margin-top: 15px;">
            <a href="{{ url_for('delete', post_id=post.id) }}"
               style="color: #D9534F; text-decoration: none; font-weight: bold;"
               onclick="return confirm('Are you sure you want to delete this post?');">
                Delete Post
            </a>
        </div>
    </div>
    {% endfor %}

</body>
</html>
