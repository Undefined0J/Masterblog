<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Post - My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Add a New Blog Post</h1>

    <div class="post">
        <form action="{{ url_for('add') }}" method="POST">

            <div style="margin-bottom: 15px;">
                <label for="author">Author:</label><br>
                <input type="text" id="author" name="author" required style="width: 100%; box-sizing: border-box; padding: 5px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="title">Title:</label><br>
                <input type="text" id="title" name="title" required style="width: 100%; box-sizing: border-box; padding: 5px;">
            </div>

            <div style="margin-bottom: 15px;">
                <label for="content">Content:</label><br>
                <textarea id="content" name="content" rows="5" required style="width: 100%; box-sizing: border-box; padding: 5px;"></textarea>
            </div>

            <button type="submit" style="padding: 10px 15px; cursor: pointer;">Publish Post</button>
        </form>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <a href="{{ url_for('index') }}">Back to Home</a>
    </div>

</body>
</html>
